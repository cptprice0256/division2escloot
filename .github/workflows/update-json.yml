name: Update Division2 JSON

on:
  schedule:
    - cron: "0 * * * *"   
  workflow_dispatch:         # allows manual run

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch latest JSON
        run: |
          mkdir -p data/event
          curl -L "https://hi-dep.github.io/division2/data/event/index.json" -o data/event/index.json

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/event/index.json
          git commit -m "Update JSON feed" || echo "No changes to commit"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:main
